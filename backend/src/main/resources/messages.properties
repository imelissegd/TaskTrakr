# User exceptions
exception.user.not.found=User not found with ID: %d
exception.user.duplicate.username=Username already exists: %s
exception.user.already.active=User is already active.
exception.user.already.deactivated=User is already deactivated.
exception.user.already.has.role=User already has the role: %s
